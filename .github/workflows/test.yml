name: Tests

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - '**.md'
      - '.github/workflows/docs.yml'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run flake8
        run: flake8 cli_tool tests

      - name: Run isort check
        run: isort --check-only cli_tool tests

  test:
    name: Test on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.12', '3.13']
        exclude:
          # macos-latest is arm64, skip one combination to save minutes
          - os: macos-latest
            python-version: '3.13'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run pre-commit checks
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: pre-commit run --all-files

      - name: Run tests with coverage
        run: pytest --cov=cli_tool --cov-report=xml --cov-report=term-missing --cov-fail-under=40 -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: ${{ matrix.os }}-python${{ matrix.python-version }}
          fail_ci_if_error: false

  build-test:
    name: Test Binary Build (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            platform: linux
            arch: amd64
            build_script: bash scripts/build.sh --ci --release

          # macOS Intel
          - os: macos-15-intel
            platform: darwin
            arch: amd64
            build_script: bash scripts/build.sh --ci --release

          # macOS Apple Silicon
          - os: macos-14
            platform: darwin
            arch: arm64
            build_script: bash scripts/build.sh --ci --release

          # Windows
          - os: windows-latest
            platform: windows
            arch: amd64
            build_script: |
              scripts\build-windows.bat
              scripts\package-windows.ps1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create temporary tag for version
        run: |
          git tag v0.0.1
          git describe --tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build binary
        env:
          RELEASE_VERSION: v0.0.1
          FORCE_ARCH: ${{ matrix.arch }}
        run: ${{ matrix.build_script }}

      - name: Test binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          echo "🧪 Testing binary..."
          chmod +x dist/devo 2>/dev/null || true
          BINARY_VERSION=$(./dist/devo --version 2>&1 | head -1 || echo "ERROR")
          echo "Binary version output: $BINARY_VERSION"

          if [ "$BINARY_VERSION" = "ERROR" ] || [ -z "$BINARY_VERSION" ]; then
            echo "❌ Binary test failed - no version output"
            exit 1
          fi

          echo "✅ Binary works! Version: $BINARY_VERSION"

      - name: Test binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "🧪 Testing binary..."
          try {
            $output = & "dist\devo\devo.exe" --version 2>&1 | Select-Object -First 1
            Write-Host "Binary version output: $output"

            if ([string]::IsNullOrWhiteSpace($output)) {
              Write-Host "❌ Binary test failed - no version output"
              exit 1
            }

            Write-Host "✅ Binary works! Version: $output"
          } catch {
            Write-Host "❌ Binary test failed with error: $_"
            exit 1
          }

      - name: Check binary size (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          BINARY_SIZE=$(stat -f%z dist/devo 2>/dev/null || stat -c%s dist/devo)
          BINARY_SIZE_MB=$((BINARY_SIZE / 1024 / 1024))
          echo "Binary size: ${BINARY_SIZE_MB}MB"

          if [ $BINARY_SIZE_MB -lt 10 ]; then
            echo "⚠️  Warning: Binary seems too small (${BINARY_SIZE_MB}MB)"
          fi

      - name: Check binary size (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $size = (Get-Item "dist\devo\devo.exe").Length
          $sizeMB = [math]::Round($size / 1MB, 2)
          Write-Host "Binary size: ${sizeMB}MB"

          if ($sizeMB -lt 10) {
            Write-Host "⚠️  Warning: Binary seems too small (${sizeMB}MB)"
          }
