name: Reusable Test Workflow

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to test'
        required: false
        type: string
        default: '3.12'
      os:
        description: 'Operating system to test on'
        required: false
        type: string
        default: 'ubuntu-latest'

jobs:
  test:
    name: Test on ${{ inputs.os }} with Python ${{ inputs.python-version }}
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run pre-commit checks
        run: pre-commit run --all-files

      - name: Run tests with coverage
        run: pytest --cov=cli_tool --cov-report=xml --cov-report=term-missing --cov-fail-under=75 -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: ${{ inputs.os }}-python${{ inputs.python-version }}
          fail_ci_if_error: false
