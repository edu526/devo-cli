name: Desktop

on:
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - "cli_tool/sidecar/**"
      - "cli_tool/commands/ssm/**"
      - "cli_tool/commands/aws_login/**"
      - "devo-sidecar.spec"
      - ".github/workflows/desktop.yml"
  pull_request:
    branches: [main]
    paths:
      - "desktop/**"
      - "cli_tool/sidecar/**"
      - "devo-sidecar.spec"
      - ".github/workflows/desktop.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump desktop version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha: ${{ steps.bump.outputs.sha }}
      bumped: ${{ steps.bump.outputs.bumped }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version
        id: bump
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            LAST_TAG=$(git tag -l 'app-v*' | sort -V | tail -1)
            if [ -n "$LAST_TAG" ]; then
              N=$(echo "$LAST_TAG" | grep -oE 'alpha\.[0-9]+' | cut -d. -f2)
            else
              N=0
            fi
            NEXT_VERSION="0.1.0-alpha.$(( N + 1 ))"
            CURRENT_VERSION=$(jq -r '.version' desktop/src-tauri/tauri.conf.json)
            if [ "$NEXT_VERSION" = "$CURRENT_VERSION" ]; then
              BUMPED=false
              echo "ℹ️  tauri.conf.json already at $NEXT_VERSION, no new release"
            else
              BUMPED=true
              echo "Last tag: ${LAST_TAG:-none}, current: $CURRENT_VERSION, next: $NEXT_VERSION"
            fi
            echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
            echo "bumped=$BUMPED" >> $GITHUB_OUTPUT
          else
            CURRENT_VERSION=$(jq -r '.version' desktop/src-tauri/tauri.conf.json)
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "bumped=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Event: ${{ github.event_name }} — using current $CURRENT_VERSION, no bump"
          fi

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: bump-version
    if: needs.bump-version.outputs.bumped == 'true'
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.create.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tag and release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.bump-version.outputs.version }}"
          TAG="app-v${VERSION}"
          SHA="${{ github.sha }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "⚠️  Tag $TAG already exists, skipping tag creation"
          else
            git tag "$TAG" "$SHA"
            git push origin "$TAG"
            echo "✅ Created tag $TAG"
          fi

          # Find previous app-v* tag to generate scoped release notes
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 --match "app-v*" HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            git log "${PREVIOUS_TAG}..${SHA}" --pretty=format:"* %s (%h)" -- desktop cli_tool/sidecar cli_tool/commands/ssm cli_tool/commands/aws_login devo-sidecar.spec .github/workflows/desktop.yml > raw_commits.txt
          else
            git log "${SHA}" --pretty=format:"* %s (%h)" -- desktop cli_tool/sidecar cli_tool/commands/ssm cli_tool/commands/aws_login devo-sidecar.spec .github/workflows/desktop.yml > raw_commits.txt
          fi

          echo "## Changelog" > release_notes.md

          if [ ! -s raw_commits.txt ]; then
            echo "* No desktop-specific changes in this release." >> release_notes.md
          else
            if grep -q -i "^* feat" raw_commits.txt; then
              echo "### 🚀 Features" >> release_notes.md
              grep -i "^* feat" raw_commits.txt >> release_notes.md
              echo "" >> release_notes.md
            fi

            if grep -q -i "^* fix" raw_commits.txt; then
              echo "### 🐛 Bug Fixes" >> release_notes.md
              grep -i "^* fix" raw_commits.txt >> release_notes.md
              echo "" >> release_notes.md
            fi

            if grep -q -E -i "^* (refactor|style|perf)" raw_commits.txt; then
              echo "### 💅 Polish & Refactors" >> release_notes.md
              grep -E -i "^* (refactor|style|perf)" raw_commits.txt >> release_notes.md
              echo "" >> release_notes.md
            fi

            if grep -q -v -E -i "^* (feat|fix|refactor|style|perf)" raw_commits.txt; then
              echo "### 🧰 Maintenance & Others" >> release_notes.md
              grep -v -E -i "^* (feat|fix|refactor|style|perf)" raw_commits.txt >> release_notes.md
              echo "" >> release_notes.md
            fi
          fi

          if gh release view "$TAG" --repo ${{ github.repository }} >/dev/null 2>&1; then
            echo "⚠️  Release $TAG already exists, skipping release creation"
          else
            gh release create "$TAG" \
              --prerelease \
              --title "Desktop v${VERSION}" \
              --target "$SHA" \
              --notes-file release_notes.md \
              --repo ${{ github.repository }}
            echo "✅ Created release $TAG"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT

  build-desktop:
    name: Build Desktop (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    needs: [bump-version, create-release]
    if: always() && needs.bump-version.result == 'success' && needs.create-release.result != 'failure'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x86_64
            tauri_targets: appimage
            rust_target: x86_64-unknown-linux-gnu
            updater_target: linux-x86_64
          - os: macos-14
            platform: macos
            arch: aarch64
            tauri_targets: app,dmg
            rust_target: aarch64-apple-darwin
            updater_target: darwin-aarch64
          - os: macos-14
            platform: macos
            arch: x86_64
            tauri_targets: app,dmg
            rust_target: x86_64-apple-darwin
            updater_target: darwin-x86_64
          - os: windows-latest
            platform: windows
            arch: x86_64
            # ponytail: msi does not accept semver pre-release identifiers (e.g. 0.1.0-alpha.1);
            # use nsis for alpha builds until stable versions drop the pre-release tag.
            tauri_targets: nsis
            rust_target: x86_64-pc-windows-msvc
            updater_target: windows-x86_64

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.sha }}

      - name: Apply version to build files
        shell: bash
        run: |
          VERSION="${{ needs.bump-version.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' \
            desktop/src-tauri/tauri.conf.json > tmp && mv tmp desktop/src-tauri/tauri.conf.json
          # ponytail: -i.bak is portable across GNU sed (linux) and BSD sed (macos);
          # plain -i fails on macos which requires an explicit backup extension arg.
          sed -i.bak 's/^version = .*/version = "'"$VERSION"'"/' \
            desktop/src-tauri/Cargo.toml && rm -f desktop/src-tauri/Cargo.toml.bak
          echo "✅ Version set to $VERSION for build"

      # ── Python + sidecar binary ───────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python deps (sidecar extras)
        run: |
          pip install -e ".[sidecar]"
          pip install pyinstaller pre-commit

      - name: Build sidecar binary
        run: pyinstaller devo-sidecar.spec --distpath dist-sidecar --workpath build-sidecar

      - name: Verify sidecar binary
        run: |
          ./dist-sidecar/devo-sidecar --help
          echo "✅ sidecar binary OK"

      - name: Copy sidecar into Tauri binaries dir
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p desktop/src-tauri/binaries
          TRIPLE="${{ matrix.rust_target }}"
          if [ "${{ matrix.platform }}" = "windows" ]; then
            cp dist-sidecar/devo-sidecar.exe "desktop/src-tauri/binaries/devo-sidecar-${TRIPLE}.exe"
          else
            cp dist-sidecar/devo-sidecar "desktop/src-tauri/binaries/devo-sidecar-${TRIPLE}"
            chmod +x "desktop/src-tauri/binaries/devo-sidecar-${TRIPLE}"
          fi
          echo "✅ Placed at desktop/src-tauri/binaries/devo-sidecar-${TRIPLE}"

      # ── Node + frontend ───────────────────────────────────────────────────────
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      # ── Frontend quality gates (block on lint / type errors) ──────────────────
      - name: Lint
        working-directory: desktop
        run: pnpm lint

      - name: Typecheck
        working-directory: desktop
        run: pnpm typecheck

      - name: Unit tests
        working-directory: desktop
        run: pnpm test

      # ── Rust + Tauri system deps ──────────────────────────────────────────────
      - name: Install Tauri system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "desktop/src-tauri -> target"

      # ── Tauri build ───────────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          args: --target ${{ matrix.rust_target }} --bundles ${{ matrix.tauri_targets }}
          tagName: app-v__VERSION__
          releaseName: "Devo Desktop v__VERSION__"
          releaseDraft: false
          prerelease: true
          includeUpdaterJson: true

      # ── Artifacts ────────────────────────────────────────────────────────────
      - name: Upload Linux AppImage
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: devo-desktop-${{ matrix.platform }}-${{ matrix.arch }}-${{ github.sha }}
          path: desktop/src-tauri/target/${{ matrix.rust_target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Upload macOS bundle
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: devo-desktop-${{ matrix.platform }}-${{ matrix.arch }}-${{ github.sha }}
          path: |
            desktop/src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos/*.app
            desktop/src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Windows installers
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: devo-desktop-${{ matrix.platform }}-${{ matrix.arch }}-${{ github.sha }}
          path: |
            desktop/src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe
          if-no-files-found: error

  # ── Rolling alpha channel ────────────────────────────────────────────────
  # Copies latest.json from the versioned release to a rolling "app-alpha"
  # release so all alpha binaries always check a single stable URL.
  update-alpha-channel:
    name: Update alpha channel manifest
    runs-on: ubuntu-latest
    needs: [build-desktop, bump-version, create-release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.create-release.result == 'success'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download latest.json from versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "app-v${{ needs.bump-version.outputs.version }}" \
            --pattern latest.json --output latest.json \
            --repo ${{ github.repository }}

      - name: Upload to rolling app-alpha release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create app-alpha \
            --prerelease --title "Alpha Channel" \
            --notes "Rolling alpha channel — always points to the latest alpha build." \
            --repo ${{ github.repository }} || true
          gh release upload app-alpha latest.json --clobber \
            --repo ${{ github.repository }}

      # ── Notify ───────────────────────────────────────────────────────────────
      - name: Notify Telegram on success
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: appleboy/telegram-action@master
        with:
          to: ${{ vars.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🖥️ *Devo Desktop build SUCCESS*

            Platform: `${{ matrix.platform }}-${{ matrix.arch }}`
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`

            🔗 [View Workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Notify Telegram on failure
        if: failure() && github.event_name == 'push'
        continue-on-error: true
        uses: appleboy/telegram-action@master
        with:
          to: ${{ vars.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🚨 *Devo Desktop build FAILED*

            Platform: `${{ matrix.platform }}-${{ matrix.arch }}`
            Branch: `${{ github.ref_name }}`
            Author: ${{ github.actor }}

            🔗 [View Workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  cleanup-failed-release:
    name: Cleanup Failed Release
    runs-on: ubuntu-latest
    needs: [create-release, build-desktop]
    if: always() && needs.create-release.result == 'success' && needs.build-desktop.result != 'success'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Delete release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          if [ -n "$TAG" ]; then
            echo "Deleting failed release and tag: $TAG"
            gh release delete "$TAG" --cleanup-tag --yes --repo ${{ github.repository }} || true
            git push --delete origin "$TAG" || true
          fi
