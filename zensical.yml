site_name: Devo CLI
site_description: Developer productivity CLI — Git, AWS and cloud tools from your terminal
site_url: https://devo.heyedu.dev
repo_url: https://github.com/edu526/devo-cli
repo_name: edu526/devo-cli
edit_uri: edit/main/docs/
copyright: "&copy; 2026 Devo CLI · MIT License"

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Roboto
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/edu526/devo-cli
      name: GitHub
    - icon: fontawesome/solid/globe
      link: https://devo.heyedu.dev
      name: Documentation

extra_css:
  - assets/custom.css

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: getting-started/quickstart.md
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
  - Command Reference:
      - Overview: commands/index.md
      - ssm: commands/ssm.md
      - aws-login: commands/aws-login.md
      - dynamodb: commands/dynamodb.md
      - commit: commands/commit.md
      - code-reviewer: commands/code-reviewer.md
      - codeartifact-login: commands/codeartifact.md
      - completion: commands/completion.md
      - config: commands/config.md
      - eventbridge: commands/eventbridge.md
      - upgrade: commands/upgrade.md
  - How-To Guides:
      - Overview: guides/index.md
      - Getting Started:
          - AWS Setup: guides/aws-setup.md
          - AWS Login Workflow: guides/aws-login-workflow.md
          - Shell Completion: guides/shell-completion.md
      - Development Workflows:
          - Commit Workflow: guides/commit-workflow.md
          - Code Review Workflow: guides/code-review-workflow.md
      - AWS Services:
          - CodeArtifact Login: guides/codeartifact-login.md
          - DynamoDB Export: guides/dynamodb-export.md
          - SSM Port Forwarding: guides/ssm-port-forwarding.md
  - Development:
      - Setup: development/setup.md
      - Contributing: development/contributing.md
      - Building Binaries: development/building.md
      - CI/CD: cicd/overview.md
      - Semantic Release: cicd/semantic-release.md
  - Reference:
      - Configuration Options: reference/configuration.md
      - Troubleshooting: reference/troubleshooting.md

markdown_extensions:
  - admonition
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
